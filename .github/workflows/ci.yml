name: ACP Protocol CI/CD & Automated Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-tests:
    name: Test & Validate Python Reference Runtime
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies & Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install pytest pydantic jsonschema networkx click build

    - name: Run 18-Test Automated Test Suite (`pytest`)
      run: |
        PYTHONPATH=reference-implementation pytest reference-implementation/tests/ -v

    - name: Build Python Distribution Wheels (`wheel` & `sdist`)
      run: |
        python -m build
        ls -la dist/

    - name: Upload Python Package Artifacts
      if: matrix.python-version == '3.13'
      uses: actions/upload-artifact@v4
      with:
        name: acp-python-packages
        path: dist/*

  typescript-check:
    name: Build & Validate TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk/typescript

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install TypeScript & Build SDK
      run: |
        npm install
        npm run build

  docker-build-test:
    name: Verify Docker Container & Runtime Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        docker build -t ghcr.io/zendanteam/acp-protocol:test .
